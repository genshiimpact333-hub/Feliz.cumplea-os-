<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para gre</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#0f1020,#1c1f3a);
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* estrellas */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:.4;
  pointer-events:none;
z-index:-1;
}

/* pantallas */

.screen{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
padding:20px;
}

.active{
display:flex;
}

/* botón */

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:#ffc0d4;
font-size:16px;
cursor:pointer;
margin-top:20px;
box-shadow:0 10px 20px rgba(255,182,206,.5);
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

/* flores */

.garden{
display:flex;
gap:20px;
margin-bottom:30px;
}

.flower{
width:60px;
height:60px;
background:#ffe44d;
border-radius:50%;
box-shadow:0 0 20px #ffe44d;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* candado */

.lockbox{
background:#ffe27a;
color:black;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

input{
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
}

#error{
color:red;
margin-top:10px;
}

/* confeti */

.confetti{
position:fixed;
font-size:25px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<div class="stars"></div>

<!-- pantalla 1 -->

<div id="s1" class="screen active">
<h2>tengo algo para ti</h2>
<p>pero primero presiona el botón</p>
<button onclick="next(2)">Continuar</button>
</div>

<!-- flores + cumpleaños -->

<div id="s2" class="screen">

<div class="garden">
<div class="flower"></div>
<div class="flower"></div>
<div class="flower"></div>
<div class="flower"></div>
<div class="flower"></div>
</div>

<div class="lockbox">
<h3>pon tu cumpleaños</h3>

<input id="birthday" placeholder="15/03/2007">

<br>

<button onclick="checkBirthday()">Abrir</button>

<p id="error"></p>

</div>

</div>

<!-- pantalla final -->

<div id="s3" class="screen">

<h1>feliz cumpleaños gre 🎂</h1>

<p>
solo quería hacerte esta pequeña página
</p>

<p>
porque hoy es tu día
</p>

<p>
espero que tengas un cumpleaños bonito
</p>

<p>
y que se cumplan muchos de tus deseos
</p>

<p>🌼</p>

</div>

<script>

function next(n){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById("s"+n).classList.add("active")

}

function checkBirthday(){

let b=document.getElementById("birthday").value

if(b==="15/03/2007"){

confetti()

next(3)

}else{

document.getElementById("error").innerText="creo k no es :("

}

}

function confetti(){

for(let i=0;i<30;i++){

let c=document.createElement("div")

c.className="confetti"

c.innerHTML="🎉"

c.style.left=Math.random()*100+"vw"

document.body.appendChild(c)

}

}

</script>

</body>
</html>
